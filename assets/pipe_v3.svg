<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 416 288" style="background-color: #1e1e24;">
  <defs>
    <!-- Background Grid Pattern (16px minor, 32px major) -->
    <pattern id="smallGrid" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="none" stroke="#33353b" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="url(#smallGrid)" stroke="#4a4d56" stroke-width="1"/>
    </pattern>

    <!-- Brass Materials -->
    <linearGradient id="brass-v" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7a5531" />
      <stop offset="20%" stop-color="#dfaf6e" />
      <stop offset="50%" stop-color="#ffe49c" />
      <stop offset="80%" stop-color="#b6834b" />
      <stop offset="100%" stop-color="#3a2514" />
    </linearGradient>

    <linearGradient id="brass-h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7a5531" />
      <stop offset="20%" stop-color="#dfaf6e" />
      <stop offset="50%" stop-color="#ffe49c" />
      <stop offset="80%" stop-color="#b6834b" />
      <stop offset="100%" stop-color="#3a2514" />
    </linearGradient>

    <!-- Volumetric Glass Materials -->
    <!-- For Horizontal Pipes -->
    <linearGradient id="glass-base-v" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.4)" />
      <stop offset="20%" stop-color="rgba(150, 160, 170, 0.1)" />
      <stop offset="80%" stop-color="rgba(150, 160, 170, 0.1)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.5)" />
    </linearGradient>
    
    <!-- For Vertical Pipes -->
    <linearGradient id="glass-base-h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.4)" />
      <stop offset="20%" stop-color="rgba(150, 160, 170, 0.1)" />
      <stop offset="80%" stop-color="rgba(150, 160, 170, 0.1)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.5)" />
    </linearGradient>

    <!-- Rivet Component -->
    <g id="rivet">
      <circle cx="0" cy="0" r="1.5" fill="#e8c282" stroke="#4a3018" stroke-width="0.5" />
      <circle cx="-0.5" cy="-0.5" r="0.5" fill="#fff" opacity="0.7" />
    </g>

    <!-- Drop Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.6" />
    </filter>
  </defs>

  <!-- Canvas Background -->
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- ========================================== -->
  <!-- SEGMENT A: STRAIGHT PIPE                   -->
  <!-- ========================================== -->
  <g id="segment-straight" transform="translate(32, 32)">
    <rect x="8" y="6" width="80" height="20" fill="url(#glass-base-v)" stroke="#1a1c21" stroke-width="1.5" />
    
    <line x1="8" y1="10" x2="88" y2="10" stroke="#fff" stroke-width="2" opacity="0.6" />
    <line x1="8" y1="22" x2="88" y2="22" stroke="#fff" stroke-width="1" opacity="0.3" />

    <g filter="url(#shadow)">
      <rect x="0" y="2" width="8" height="28" rx="1.5" fill="url(#brass-v)" stroke="#1a1c21" stroke-width="1.5" />
      <use href="#rivet" x="4" y="6" />
      <use href="#rivet" x="4" y="12" />
      <use href="#rivet" x="4" y="20" />
      <use href="#rivet" x="4" y="26" />
    </g>
    <g filter="url(#shadow)">
      <rect x="88" y="2" width="8" height="28" rx="1.5" fill="url(#brass-v)" stroke="#1a1c21" stroke-width="1.5" />
      <use href="#rivet" x="92" y="6" />
      <use href="#rivet" x="92" y="12" />
      <use href="#rivet" x="92" y="20" />
      <use href="#rivet" x="92" y="26" />
    </g>
  </g>

  <!-- ========================================== -->
  <!-- SEGMENT B: T-JUNCTION                      -->
  <!-- ========================================== -->
  <g id="segment-t-junction" transform="translate(160, 32)">
    <path d="M 8 38 L 32 38 C 35 38, 38 35, 38 32 L 38 8 L 58 8 L 58 32 C 58 35, 61 38, 64 38 L 88 38 L 88 58 L 8 58 Z" 
          fill="url(#glass-base-v)" stroke="#1a1c21" stroke-width="1.5" />

    <path d="M 8 42 L 32 42 C 37 42, 42 37, 42 32 L 42 8" fill="none" stroke="#fff" stroke-width="2" opacity="0.6" />
    <path d="M 88 42 L 64 42 C 59 42, 54 37, 54 32 L 54 8" fill="none" stroke="#fff" stroke-width="2" opacity="0.6" />
    <line x1="8" y1="54" x2="88" y2="54" stroke="#fff" stroke-width="1" opacity="0.3" />

    <g filter="url(#shadow)">
      <rect x="0" y="34" width="8" height="28" rx="1.5" fill="url(#brass-v)" stroke="#1a1c21" stroke-width="1.5" />
      <use href="#rivet" x="4" y="38" />
      <use href="#rivet" x="4" y="44" />
      <use href="#rivet" x="4" y="52" />
      <use href="#rivet" x="4" y="58" />
    </g>
    <g filter="url(#shadow)">
      <rect x="88" y="34" width="8" height="28" rx="1.5" fill="url(#brass-v)" stroke="#1a1c21" stroke-width="1.5" />
      <use href="#rivet" x="92" y="38" />
      <use href="#rivet" x="92" y="44" />
      <use href="#rivet" x="92" y="52" />
      <use href="#rivet" x="92" y="58" />
    </g>
    <g filter="url(#shadow)">
      <rect x="34" y="0" width="28" height="8" rx="1.5" fill="url(#brass-h)" stroke="#1a1c21" stroke-width="1.5" />
      <use href="#rivet" x="38" y="4" />
      <use href="#rivet" x="44" y="4" />
      <use href="#rivet" x="52" y="4" />
      <use href="#rivet" x="58" y="4" />
    </g>
  </g>

  <!-- ========================================== -->
  <!-- SEGMENT C: 90-DEGREE ELBOW                 -->
  <!-- ========================================== -->
  <g id="segment-elbow" transform="translate(288, 32)">
    <path d="M 8 38 L 32 38 C 35 38, 38 35, 38 32 L 38 8 L 58 8 L 58 32 C 58 46, 46 58, 32 58 L 8 58 Z" 
          fill="url(#glass-base-v)" stroke="#1a1c21" stroke-width="1.5" />

    <path d="M 8 42 L 32 42 C 37 42, 42 37, 42 32 L 42 8" fill="none" stroke="#fff" stroke-width="2" opacity="0.6" />
    <path d="M 8 54 L 32 54 C 44 54, 54 44, 54 32 L 54 8" fill="none" stroke="#fff" stroke-width="1" opacity="0.3" />

    <g filter="url(#shadow)">
      <rect x="0" y="34" width="8" height="28" rx="1.5" fill="url(#brass-v)" stroke="#1a1c21" stroke-width="1.5" />
      <use href="#rivet" x="4" y="38" />
      <use href="#rivet" x="4" y="44" />
      <use href="#rivet" x="4" y="52" />
      <use href="#rivet" x="4" y="58" />
    </g>
    <g filter="url(#shadow)">
      <rect x="34" y="0" width="28" height="8" rx="1.5" fill="url(#brass-h)" stroke="#1a1c21" stroke-width="1.5" />
      <use href="#rivet" x="38" y="4" />
      <use href="#rivet" x="44" y="4" />
      <use href="#rivet" x="52" y="4" />
      <use href="#rivet" x="58" y="4" />
    </g>
  </g>

  <!-- ========================================== -->
  <!-- SEGMENT D: 4-WAY CROSS                     -->
  <!-- ========================================== -->
  <g id="segment-cross" transform="translate(32, 128)">
    <path d="M 8 38 L 32 38 C 35 38, 38 35, 38 32 L 38 8 L 58 8 L 58 32 C 58 35, 61 38, 64 38 L 88 38 L 88 58 L 64 58 C 61 58, 58 61, 58 64 L 58 88 L 38 88 L 38 64 C 38 61, 35 58, 32 58 L 8 58 Z" 
          fill="url(#glass-base-v)" stroke="#1a1c21" stroke-width="1.5" />

    <path d="M 8 42 L 32 42 C 37 42, 42 37, 42 32 L 42 8" fill="none" stroke="#fff" stroke-width="2" opacity="0.6" />
    <path d="M 88 42 L 64 42 C 59 42, 54 37, 54 32 L 54 8" fill="none" stroke="#fff" stroke-width="2" opacity="0.6" />
    <path d="M 88 54 L 64 54 C 59 54, 54 59, 54 64 L 54 88" fill="none" stroke="#fff" stroke-width="1" opacity="0.3" />
    <path d="M 8 54 L 32 54 C 37 54, 42 59, 42 64 L 42 88" fill="none" stroke="#fff" stroke-width="1" opacity="0.3" />

    <g filter="url(#shadow)">
      <rect x="0" y="34" width="8" height="28" rx="1.5" fill="url(#brass-v)" stroke="#1a1c21" stroke-width="1.5" />
      <use href="#rivet" x="4" y="38" />
      <use href="#rivet" x="4" y="44" />
      <use href="#rivet" x="4" y="52" />
      <use href="#rivet" x="4" y="58" />
    </g>
    <g filter="url(#shadow)">
      <rect x="88" y="34" width="8" height="28" rx="1.5" fill="url(#brass-v)" stroke="#1a1c21" stroke-width="1.5" />
      <use href="#rivet" x="92" y="38" />
      <use href="#rivet" x="92" y="44" />
      <use href="#rivet" x="92" y="52" />
      <use href="#rivet" x="92" y="58" />
    </g>
    <g filter="url(#shadow)">
      <rect x="34" y="0" width="28" height="8" rx="1.5" fill="url(#brass-h)" stroke="#1a1c21" stroke-width="1.5" />
      <use href="#rivet" x="38" y="4" />
      <use href="#rivet" x="44" y="4" />
      <use href="#rivet" x="52" y="4" />
      <use href="#rivet" x="58" y="4" />
    </g>
    <g filter="url(#shadow)">
      <rect x="34" y="88" width="28" height="8" rx="1.5" fill="url(#brass-h)" stroke="#1a1c21" stroke-width="1.5" />
      <use href="#rivet" x="38" y="92" />
      <use href="#rivet" x="44" y="92" />
      <use href="#rivet" x="52" y="92" />
      <use href="#rivet" x="58" y="92" />
    </g>
  </g>

  <!-- ========================================== -->
  <!-- SEGMENT E: VERTICAL STRAIGHT                 -->
  <!-- ========================================== -->
  <g id="segment-vertical" transform="translate(160, 128)">
    <!-- Uses horizontal glass gradient to preserve cylindrical lighting horizontally across vertical tube -->
    <rect x="6" y="8" width="20" height="80" fill="url(#glass-base-h)" stroke="#1a1c21" stroke-width="1.5" />
    
    <line x1="10" y1="8" x2="10" y2="88" stroke="#fff" stroke-width="2" opacity="0.6" />
    <line x1="22" y1="8" x2="22" y2="88" stroke="#fff" stroke-width="1" opacity="0.3" />

    <g filter="url(#shadow)">
      <rect x="2" y="0" width="28" height="8" rx="1.5" fill="url(#brass-h)" stroke="#1a1c21" stroke-width="1.5" />
      <use href="#rivet" x="6" y="4" />
      <use href="#rivet" x="12" y="4" />
      <use href="#rivet" x="20" y="4" />
      <use href="#rivet" x="26" y="4" />
    </g>
    <g filter="url(#shadow)">
      <rect x="2" y="88" width="28" height="8" rx="1.5" fill="url(#brass-h)" stroke="#1a1c21" stroke-width="1.5" />
      <use href="#rivet" x="6" y="92" />
      <use href="#rivet" x="12" y="92" />
      <use href="#rivet" x="20" y="92" />
      <use href="#rivet" x="26" y="92" />
    </g>
  </g>

  <!-- ========================================== -->
  <!-- SEGMENT F: END CAP                         -->
  <!-- ========================================== -->
  <g id="segment-endcap" transform="translate(224, 128)">
    <rect x="8" y="4" width="12" height="24" rx="3" fill="url(#brass-v)" stroke="#1a1c21" stroke-width="1.5" />
    <rect x="10" y="8" width="8" height="16" rx="2" fill="none" stroke="#3a2514" stroke-width="1" opacity="0.5" />

    <g filter="url(#shadow)">
      <rect x="0" y="2" width="8" height="28" rx="1.5" fill="url(#brass-v)" stroke="#1a1c21" stroke-width="1.5" />
      <use href="#rivet" x="4" y="6" />
      <use href="#rivet" x="4" y="12" />
      <use href="#rivet" x="4" y="20" />
      <use href="#rivet" x="4" y="26" />
    </g>
  </g>

</svg>
